# infra/k8s/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: limit-order-execution-hpa
  namespace: onchainos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: limit-order-execution
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Object
    object:
      metric:
        name: redis_queue_length
      describedObject:
        apiVersion: v1
        kind: Service
        name: redis-master
      target:
        type: Value
        value: "10"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 4
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
